<header class="app-header shadow-md sticky-top">
  <nav class="header-nav">
    <div class="logo">
      <img src="./media/img/unmsm.png" alt="UNMSM Escudo" height="40">
      <span>FISI IA</span>
    </div>

    <button class="nav-toggle" (click)="toggleNav()" aria-label="Abrir navegación móvil">
      <i class="pi" [class.pi-bars]="!isNavOpen" [class.pi-times]="isNavOpen"></i>
    </button>

    <ul class="nav-links" [class.open]="isNavOpen">
      <li><a [class.active]="activeSection === 'inicio'" href="#inicio" (click)="closeNav()">Inicio</a></li>
      <li><a [class.active]="activeSection === 'docente'" href="#docente" (click)="closeNav()">Docente</a></li>
      <li><a [class.active]="activeSection === 'grupo'" href="#grupo" (click)="closeNav()">Grupo</a></li>
      <li><a [class.active]="activeSection === 'material'" href="#material" (click)="closeNav()">Material</a></li>
      <li class="mobile-only">
        <button class="syllabus-btn" onclick="openSyllabus()">Syllabus</button>
      </li>
    </ul>

    <button class="syllabus-btn desktop-only" onclick="openSyllabus()">
      Syllabus
    </button>
  </nav>

  <div class="nav-overlay" [class.show]="isNavOpen" (click)="closeNav()"></div>
</header>
